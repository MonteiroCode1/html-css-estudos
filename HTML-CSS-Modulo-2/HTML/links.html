<head>

    <title>Document</title>
    <style>
        body {
            font-family: Verdana, Geneva, Tahoma, sans-serif;
            font-weight: bold;
        }

        a {
            text-decoration: none;
            color: blueviolet;
        }

        a:hover {
            color: blue;
            text-decoration: underline;
        }

        a:visited {
            color: green;
        }

        a:active {
            color: blue;
        }

        /*Pseudo elementos */
        a::after {
            content: ' =>';
            color: red;
        }
        a::before {
            content: '<= ';
            color: red;
        }
    </style>
</head>
